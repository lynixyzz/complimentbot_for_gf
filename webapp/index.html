<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Фраза дня</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --space: #07030f;
    --text: #f5f0ff;
    --label: #a78bfa;
    --dim: #6f5fa3;
    --rose: #ff6ea9; --amber: #ffb86b; --mint: #5ff2b9; --sky: #5ecfff; --violet: #a06bff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--space);
    color: var(--text);
    font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }

  /* ===== Космос: глубина из трёх слоёв ===== */
  .nebula {
    position: fixed; inset: -20%;
    background:
      radial-gradient(45% 38% at 22% 18%, rgba(160,107,255,.16), transparent 70%),
      radial-gradient(40% 34% at 80% 72%, rgba(255,110,169,.10), transparent 70%),
      radial-gradient(50% 42% at 62% 24%, rgba(94,207,255,.08), transparent 70%);
    animation: nebula-drift 26s ease-in-out infinite alternate;
  }
  @keyframes nebula-drift {
    to { transform: translate(3%, -2%) scale(1.06); }
  }
  .stars, .stars-far {
    position: fixed; inset: 0;
    background-repeat: repeat;
  }
  .stars-far {
    background-image:
      radial-gradient(1px 1px at 13% 21%, rgba(255,255,255,.5), transparent),
      radial-gradient(1px 1px at 67% 9%,  rgba(255,255,255,.35), transparent),
      radial-gradient(1px 1px at 39% 64%, rgba(203,182,255,.4), transparent),
      radial-gradient(1px 1px at 88% 47%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 8% 81%,  rgba(255,255,255,.35), transparent);
    background-size: 340px 340px;
  }
  .stars {
    background-image:
      radial-gradient(1.4px 1.4px at 27% 33%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 74% 71%, #e7dcff, transparent),
      radial-gradient(1.6px 1.6px at 52% 12%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 91% 28%, #cfe9ff, transparent),
      radial-gradient(1.4px 1.4px at 15% 58%, #fff, transparent);
    background-size: 480px 480px;
    animation: twinkle 5s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: .9; } to { opacity: .45; } }

  /* ===== Каркас ===== */
  .wrap {
    position: relative; z-index: 2;
    height: 100vh;
    height: 100dvh;
    padding: calc(env(safe-area-inset-top, 0px) + 28px) 24px calc(env(safe-area-inset-bottom, 0px) + 34px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    text-align: center;
  }

  .eyebrow {
    display: flex; flex-direction: column; gap: 8px; align-items: center;
    animation: fade-down .9s ease both;
  }
  .eyebrow .date {
    font-size: 12px; font-weight: 500;
    letter-spacing: .34em; text-transform: uppercase;
    color: var(--label);
  }
  .eyebrow .line {
    width: 34px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--label), transparent);
    opacity: .6;
  }
  @keyframes fade-down { from { opacity: 0; transform: translateY(-12px); } }

  /* ===== Сфера ===== */
  .stage {
    position: relative;
    width: min(64vw, 268px); aspect-ratio: 1;
    cursor: pointer;
    animation: fade-in 1.1s ease both .15s;
    transition: transform .9s cubic-bezier(.22,1,.36,1);
  }
  @keyframes fade-in { from { opacity: 0; transform: scale(.92); } }

  .halo {
    position: absolute; inset: -18%;
    border-radius: 50%;
    background: conic-gradient(from 40deg, var(--rose), var(--amber), var(--mint), var(--sky), var(--violet), var(--rose));
    filter: blur(38px) saturate(1.2);
    opacity: .42;
    animation: rotate 14s linear infinite reverse, breathe 4.6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: .38; }
    50%      { transform: scale(1.07); opacity: .5; }
  }

  .sphere {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--rose), var(--amber), var(--mint), var(--sky), var(--violet), var(--rose));
    animation: rotate 9s linear infinite;
    box-shadow:
      inset -26px -30px 70px rgba(4,1,14,.72),
      inset 20px 24px 60px rgba(255,255,255,.28),
      0 24px 80px rgba(160,107,255,.34);
  }
  .sphere::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(58% 44% at 33% 26%, rgba(255,255,255,.9), transparent 62%),
      radial-gradient(80% 62% at 68% 82%, rgba(7,3,15,.55), transparent 70%);
    mix-blend-mode: soft-light;
  }
  .sphere::after {
    content: ""; position: absolute; inset: -1px; border-radius: 50%;
    background: radial-gradient(closest-side, transparent 82%, rgba(255,255,255,.22) 98%, transparent 100%);
  }
  @keyframes rotate { to { transform: rotate(360deg); } }

  /* Орбита с двумя спутниками */
  .orbit {
    position: absolute; inset: -13%;
    border-radius: 50%;
    border: 1px solid rgba(167,139,250,.2);
    transform: rotateX(72deg);
    transform-style: preserve-3d;
    animation: orbit-spin 12s linear infinite;
    pointer-events: none;
  }
  @keyframes orbit-spin { to { transform: rotateX(72deg) rotateZ(360deg); } }
  .orbit i {
    position: absolute; width: 7px; height: 7px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 12px 3px rgba(94,207,255,.8);
  }
  .orbit i:first-child { top: -3px; left: 50%; }
  .orbit i:last-child  { bottom: -3px; left: 30%; background: var(--rose); box-shadow: 0 0 12px 3px rgba(255,110,169,.8); }

  /* Пульс при касании */
  .pulse {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.55);
    opacity: 0; transform: scale(1);
    pointer-events: none;
  }
  .pulse.go { animation: pulse-out .9s cubic-bezier(.22,1,.36,1) forwards; }
  @keyframes pulse-out {
    from { opacity: .8; transform: scale(1); }
    to   { opacity: 0;  transform: scale(1.55); }
  }

  /* Сфера сжимается после раскрытия */
  body.revealed .stage { transform: scale(.62) translateY(-8px); }
  body.revealed .halo { animation-duration: 9s, 4.6s; }

  /* ===== Фраза ===== */
  .oracle {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    min-height: 38dvh;
    justify-content: flex-start;
  }
  .phrase {
    font-family: "Unbounded", "Inter", sans-serif;
    font-weight: 300;
    font-size: clamp(17px, 4.9vw, 23px);
    line-height: 1.6;
    max-width: 26ch;
    text-wrap: balance;
    min-height: 2em;
  }
  .phrase .w {
    display: inline-block;
    opacity: 0;
    filter: blur(8px);
    transform: translateY(14px);
    transition: opacity .7s ease, filter .7s ease, transform .7s cubic-bezier(.22,1,.36,1);
  }
  .phrase .w.in { opacity: 1; filter: blur(0); transform: none; }

  .hint {
    font-size: 13px; color: var(--dim);
    letter-spacing: .06em;
    animation: hint-float 2.8s ease-in-out infinite;
    transition: opacity .5s ease;
  }
  @keyframes hint-float {
    0%, 100% { transform: translateY(0); opacity: .85; }
    50%      { transform: translateY(-4px); opacity: .5; }
  }
  body.revealed .hint { animation: none; opacity: 0; }

  .tomorrow {
    font-size: 12px; color: var(--dim);
    letter-spacing: .22em; text-transform: uppercase;
    opacity: 0; transform: translateY(8px);
    transition: opacity .8s ease 1.6s, transform .8s ease 1.6s;
  }
  body.revealed .tomorrow { opacity: .9; transform: none; }

  /* ===== Доступность ===== */
  .stage:focus-visible { outline: 2px solid var(--sky); outline-offset: 8px; border-radius: 50%; }
  @media (prefers-reduced-motion: reduce) {
    .nebula, .stars, .halo, .sphere, .orbit, .hint { animation: none !important; }
    .stage, .phrase .w, .tomorrow { transition-duration: .01s !important; }
  }
</style>
</head>
<body>
  <div class="nebula"></div>
  <div class="stars-far"></div>
  <div class="stars"></div>

  <main class="wrap">
    <header class="eyebrow">
      <span class="date" id="date"></span>
      <span class="line"></span>
    </header>

    <div class="stage" id="stage" role="button" tabindex="0" aria-label="Открыть фразу дня">
      <div class="halo"></div>
      <div class="sphere"></div>
      <div class="orbit"><i></i><i></i></div>
      <div class="pulse" id="pulse"></div>
    </div>

    <section class="oracle">
      <p class="phrase" id="phrase" aria-live="polite"></p>
      <div class="hint" id="hint">коснись сферы</div>
      <div class="tomorrow">новая фраза — завтра ✦</div>
    </section>
  </main>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.ready(); tg.expand();
    try { tg.setHeaderColor("#07030f"); tg.setBackgroundColor("#07030f"); } catch (e) {}
    try { tg.disableVerticalSwipes(); } catch (e) {}
  }

  // Дата-ритуал: «21 июля»
  const months = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
  const now = new Date();
  document.getElementById("date").textContent = now.getDate() + " " + months[now.getMonth()];

  const stage = document.getElementById("stage");
  const pulse = document.getElementById("pulse");
  const phraseEl = document.getElementById("phrase");
  const FALLBACK = "Дыши. Ты справляешься лучше, чем думаешь.";
  let busy = false, revealed = false;

  async function reveal() {
    if (busy || revealed) return;
    busy = true;

    pulse.classList.remove("go"); void pulse.offsetWidth; pulse.classList.add("go");
    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");

    let text = FALLBACK;
    try {
      const r = await fetch("phrase", { cache: "no-store" });
      text = (await r.json()).phrase || FALLBACK;
    } catch (e) {}

    revealed = true;
    document.body.classList.add("revealed");

    // Слова проявляются из размытия по очереди
    phraseEl.innerHTML = "";
    const words = text.split(" ").map(w => {
      const s = document.createElement("span");
      s.className = "w";
      s.textContent = w;
      phraseEl.append(s, document.createTextNode(" "));
      return s;
    });
    words.forEach((s, i) => setTimeout(() => {
      s.classList.add("in");
      if (i === words.length - 1 && tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
    }, 350 + i * 110));
    busy = false;
  }

  stage.addEventListener("click", reveal);
  stage.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); reveal(); }
  });
</script>
</body>
</html>
