<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Фраза дня</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: radial-gradient(120% 120% at 50% 0%, #1a0b3d 0%, #0a0416 55%, #05020c 100%);
    color: #f4f1ff;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .stars {
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 70% 60%, #cbb6ff, transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, #fff, transparent),
      radial-gradient(1px 1px at 85% 20%, #fff, transparent),
      radial-gradient(1px 1px at 55% 45%, #d8ccff, transparent);
    opacity: .7;
    animation: drift 14s linear infinite alternate;
  }
  @keyframes drift { to { transform: translateY(-14px); } }
  .wrap {
    position: relative; z-index: 1;
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 40px; padding: 32px;
    text-align: center;
  }
  .sphere-shell { position: relative; width: 240px; height: 240px; cursor: pointer; }
  .sphere {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 0deg,
      #ff5e9c, #ffb65e, #fff871, #6bff9e, #5ee0ff, #9c7bff, #ff6bd6, #ff5e9c);
    filter: saturate(1.3) blur(.3px);
    animation: spin 7s linear infinite;
    box-shadow:
      0 0 60px rgba(156,123,255,.55),
      0 0 120px rgba(94,224,255,.35),
      inset -20px -24px 60px rgba(0,0,0,.55),
      inset 24px 20px 60px rgba(255,255,255,.35);
  }
  .sphere::after {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(60% 45% at 35% 28%, rgba(255,255,255,.85), rgba(255,255,255,0) 60%);
    mix-blend-mode: screen;
  }
  .halo {
    position: absolute; inset: -26px; border-radius: 50%;
    background: conic-gradient(from 0deg, #ff5e9c, #5ee0ff, #9c7bff, #6bff9e, #ff5e9c);
    filter: blur(34px); opacity: .5; z-index: -1;
    animation: spin 11s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .label { font-size: 14px; letter-spacing: .28em; text-transform: uppercase; color: #b6a7ff; }
  .phrase {
    font-size: 22px; line-height: 1.45; font-weight: 600; max-width: 22ch;
    min-height: 3.2em;
    opacity: 0; transform: translateY(10px);
    transition: opacity .6s ease, transform .6s ease;
    text-wrap: balance;
  }
  .phrase.show { opacity: 1; transform: none; }
  .hint { font-size: 13px; color: #7d6fb0; }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="wrap">
    <div class="sphere-shell" id="shell">
      <div class="halo"></div>
      <div class="sphere"></div>
    </div>
    <div>
      <div class="label">фраза дня</div>
      <p class="phrase" id="phrase"></p>
      <div class="hint" id="hint">коснись сферы</div>
    </div>
  </div>
<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const phraseEl = document.getElementById("phrase");
  const hintEl = document.getElementById("hint");
  const shell = document.getElementById("shell");
  let loaded = false;

  async function reveal() {
    if (loaded) return;
    loaded = true;
    hintEl.textContent = "";
    try {
      const r = await fetch("phrase", { cache: "no-store" });
      const data = await r.json();
      phraseEl.textContent = data.phrase;
    } catch (e) {
      phraseEl.textContent = "Дыши. Ты справляешься лучше, чем думаешь.";
    }
    phraseEl.classList.add("show");
    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");
  }
  shell.addEventListener("click", reveal);
</script>
</body>
</html>
