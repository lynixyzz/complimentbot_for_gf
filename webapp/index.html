<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Фраза дня</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Глубокий индиго-космос (не чистый чёрный — OLED) */
    --space: #0a0818;
    --space-deep: #070512;
    --text: #f8fafc;
    --label: #a5b4fc;
    --dim: #8b7fc7;
    /* Сфера: глубокие камни, не пастель */
    --violet-deep: #4c1d95;
    --violet: #7c3aed;
    --magenta: #db2777;
    --wine: #9d174d;
    --navy: #1e3a8a;
    --teal: #0e7490;
    --ease-expo: cubic-bezier(.16, 1, .3, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: radial-gradient(130% 100% at 50% 0%, #120e2b 0%, var(--space) 48%, var(--space-deep) 100%);
    color: var(--text);
    font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }

  /* ===== Космос: туманность + два слоя звёзд (только transform/opacity) ===== */
  .nebula {
    position: fixed; inset: -22%;
    background:
      radial-gradient(42% 36% at 24% 20%, rgba(76,29,149,.34), transparent 70%),
      radial-gradient(38% 32% at 78% 74%, rgba(157,23,77,.20), transparent 70%),
      radial-gradient(46% 40% at 64% 22%, rgba(14,116,144,.16), transparent 70%);
    animation: nebula-drift 30s ease-in-out infinite alternate;
    will-change: transform;
  }
  @keyframes nebula-drift {
    to { transform: translate3d(3%, -2%, 0) scale(1.05); }
  }
  .stars-far, .stars {
    position: fixed; inset: 0;
    background-repeat: repeat;
  }
  .stars-far {
    background-image:
      radial-gradient(1px 1px at 13% 21%, rgba(255,255,255,.45), transparent),
      radial-gradient(1px 1px at 67% 9%,  rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 39% 64%, rgba(165,180,252,.35), transparent),
      radial-gradient(1px 1px at 88% 47%, rgba(255,255,255,.25), transparent),
      radial-gradient(1px 1px at 8% 81%,  rgba(255,255,255,.3), transparent);
    background-size: 340px 340px;
  }
  .stars {
    background-image:
      radial-gradient(1.4px 1.4px at 27% 33%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 74% 71%, #ddd6fe, transparent),
      radial-gradient(1.6px 1.6px at 52% 12%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 91% 28%, #bae6fd, transparent),
      radial-gradient(1.4px 1.4px at 15% 58%, #fff, transparent);
    background-size: 480px 480px;
    animation: twinkle 6s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: .9; } to { opacity: .4; } }

  /* ===== Каркас ===== */
  .wrap {
    position: relative; z-index: 2;
    height: 100vh;
    height: 100dvh;
    padding: calc(env(safe-area-inset-top, 0px) + 28px) 24px calc(env(safe-area-inset-bottom, 0px) + 34px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    text-align: center;
  }

  .eyebrow {
    display: flex; flex-direction: column; gap: 8px; align-items: center;
    animation: enter-down .9s var(--ease-expo) both .35s;
  }
  .eyebrow .date {
    font-size: 12px; font-weight: 500;
    letter-spacing: .34em; text-transform: uppercase;
    color: var(--label);
  }
  .eyebrow .line {
    width: 34px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--label), transparent);
    opacity: .6;
  }
  @keyframes enter-down { from { opacity: 0; transform: translate3d(0,-14px,0); } }

  /* ===== Сцена сферы ===== */
  .stage {
    position: relative;
    width: min(64vw, 268px); aspect-ratio: 1;
    cursor: pointer;
    animation: enter-sphere 1.2s var(--ease-expo) both .1s;
    transition: transform .9s var(--ease-expo);
  }
  @keyframes enter-sphere {
    from { opacity: 0; transform: scale(.78); }
    60%  { opacity: 1; }
    to   { opacity: 1; transform: scale(1); }
  }
  /* Отклик на касание (44px+ цель — вся сфера) */
  .stage:active { transform: scale(.97); transition-duration: .15s; }
  body.revealed .stage,
  body.revealed .stage:active { transform: scale(.6) translate3d(0,-8px,0); }

  /* Гало: статичное размытие, вращается только transform-слой */
  .halo-wrap {
    position: absolute; inset: -16%;
    animation: breathe 5s ease-in-out infinite;
    will-change: transform;
  }
  .halo {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 40deg,
      var(--violet), var(--magenta), var(--wine), var(--navy), var(--teal), var(--violet));
    filter: blur(28px) saturate(1.25);
    opacity: .5;
    animation: rotate 16s linear infinite reverse;
    will-change: transform;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }

  /* Сфера: плазма вращается ПОД неподвижным светом */
  .sphere {
    position: absolute; inset: 0;
    border-radius: 50%;
    overflow: hidden;
    transform: translateZ(0);
    box-shadow:
      inset -28px -34px 70px rgba(5,3,14,.85),
      inset 18px 22px 55px rgba(196,181,253,.25),
      0 26px 90px rgba(76,29,149,.5);
  }
  .plasma {
    position: absolute; inset: -12%;
    border-radius: 50%;
    background: conic-gradient(from 210deg,
      var(--violet-deep), var(--violet), var(--magenta), var(--wine),
      var(--navy), var(--teal), var(--violet-deep));
    animation: rotate 11s linear infinite;
    will-change: transform;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }
  /* Неподвижный источник света + ядро */
  .sphere::before {
    content: ""; position: absolute; inset: 0; border-radius: 50%;
    background:
      radial-gradient(55% 42% at 32% 25%, rgba(255,255,255,.55), transparent 60%),
      radial-gradient(70% 70% at 50% 55%, transparent 40%, rgba(5,3,14,.5) 100%);
    z-index: 2;
  }
  .sphere::after {
    content: ""; position: absolute; inset: -1px; border-radius: 50%;
    background: radial-gradient(closest-side, transparent 80%, rgba(221,214,254,.28) 97%, transparent 100%);
    z-index: 3;
  }

  /* Орбита: два спутника */
  .orbit {
    position: absolute; inset: -13%;
    border-radius: 50%;
    border: 1px solid rgba(165,180,252,.22);
    transform: rotateX(72deg);
    transform-style: preserve-3d;
    animation: orbit-spin 13s linear infinite;
    pointer-events: none;
    will-change: transform;
  }
  @keyframes orbit-spin { to { transform: rotateX(72deg) rotateZ(360deg); } }
  .orbit i {
    position: absolute; width: 7px; height: 7px; border-radius: 50%;
    background: #e0e7ff;
    box-shadow: 0 0 12px 3px rgba(165,180,252,.85);
  }
  .orbit i:first-child { top: -3.5px; left: 50%; }
  .orbit i:last-child  { bottom: -3.5px; left: 28%; background: #f9a8d4; box-shadow: 0 0 12px 3px rgba(219,39,119,.8); }

  /* Двойной пульс при касании */
  .ripple {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1.5px solid rgba(224,231,255,.6);
    opacity: 0; transform: scale(1);
    pointer-events: none;
  }
  .ripple.go   { animation: ripple-out 1s var(--ease-expo) forwards; }
  .ripple.go2  { animation: ripple-out 1.15s var(--ease-expo) .12s forwards; }
  @keyframes ripple-out {
    from { opacity: .75; transform: scale(1); }
    to   { opacity: 0;  transform: scale(1.6); }
  }

  /* ===== Фраза ===== */
  .oracle {
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    min-height: 38dvh;
    justify-content: flex-start;
  }
  .phrase {
    font-family: "Unbounded", "Inter", sans-serif;
    font-weight: 300;
    font-size: clamp(17px, 4.9vw, 23px);
    line-height: 1.65;
    max-width: 26ch;
    text-wrap: balance;
    min-height: 2em;
  }
  /* Слова: только transform + opacity, экспо-выход */
  .phrase .w {
    display: inline-block;
    opacity: 0;
    transform: translate3d(0, 16px, 0) scale(.94);
    transition: opacity .65s ease, transform .75s var(--ease-expo);
  }
  .phrase .w.in { opacity: 1; transform: translate3d(0,0,0) scale(1); }

  .hint {
    font-size: 13px; color: var(--dim);
    letter-spacing: .06em;
    animation: enter-up .9s var(--ease-expo) both .8s, hint-pulse 3s ease-in-out 1.8s infinite;
    transition: opacity .4s ease;
  }
  @keyframes enter-up { from { opacity: 0; transform: translate3d(0,12px,0); } }
  @keyframes hint-pulse {
    0%, 100% { opacity: .9; }
    50%      { opacity: .45; }
  }
  body.revealed .hint { animation: none; opacity: 0; }

  .tomorrow {
    font-size: 12px; color: var(--dim);
    letter-spacing: .22em; text-transform: uppercase;
    opacity: 0; transform: translate3d(0,8px,0);
    transition: opacity .8s ease 1.7s, transform .8s var(--ease-expo) 1.7s;
  }
  body.revealed .tomorrow { opacity: .9; transform: translate3d(0,0,0); }

  /* ===== Доступность ===== */
  .stage:focus-visible { outline: 2px solid var(--label); outline-offset: 8px; border-radius: 50%; }
  @media (prefers-reduced-motion: reduce) {
    .nebula, .stars, .halo, .halo-wrap, .plasma, .orbit, .hint, .stage, .eyebrow { animation: none !important; }
    .stage, .phrase .w, .tomorrow { transition-duration: .01s !important; transition-delay: 0s !important; }
    .eyebrow, .hint { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="nebula"></div>
  <div class="stars-far"></div>
  <div class="stars"></div>

  <main class="wrap">
    <header class="eyebrow">
      <span class="date" id="date"></span>
      <span class="line"></span>
    </header>

    <div class="stage" id="stage" role="button" tabindex="0" aria-label="Открыть фразу дня">
      <div class="halo-wrap"><div class="halo"></div></div>
      <div class="sphere"><div class="plasma"></div></div>
      <div class="orbit"><i></i><i></i></div>
      <div class="ripple" id="r1"></div>
      <div class="ripple" id="r2"></div>
    </div>

    <section class="oracle">
      <p class="phrase" id="phrase" aria-live="polite"></p>
      <div class="hint" id="hint">коснись сферы</div>
      <div class="tomorrow">новая фраза — завтра ✦</div>
    </section>
  </main>

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.ready(); tg.expand();
    try { tg.setHeaderColor("#0a0818"); tg.setBackgroundColor("#0a0818"); } catch (e) {}
    try { tg.disableVerticalSwipes(); } catch (e) {}
  }

  const months = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
  const now = new Date();
  document.getElementById("date").textContent = now.getDate() + " " + months[now.getMonth()];

  const stage = document.getElementById("stage");
  const r1 = document.getElementById("r1");
  const r2 = document.getElementById("r2");
  const phraseEl = document.getElementById("phrase");
  const FALLBACK = "Дыши. Ты справляешься лучше, чем думаешь.";
  let busy = false, revealed = false;

  async function reveal() {
    if (busy || revealed) return;
    busy = true;

    r1.classList.remove("go");  void r1.offsetWidth;  r1.classList.add("go");
    r2.classList.remove("go2"); void r2.offsetWidth;  r2.classList.add("go2");
    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("medium");

    let text = FALLBACK;
    try {
      const r = await fetch("phrase", { cache: "no-store" });
      text = (await r.json()).phrase || FALLBACK;
    } catch (e) {}

    revealed = true;
    document.body.classList.add("revealed");

    phraseEl.innerHTML = "";
    const words = text.split(" ").map(w => {
      const s = document.createElement("span");
      s.className = "w";
      s.textContent = w;
      phraseEl.append(s, document.createTextNode(" "));
      return s;
    });
    words.forEach((s, i) => setTimeout(() => {
      s.classList.add("in");
      if (i === words.length - 1 && tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
    }, 400 + i * 95));
    busy = false;
  }

  stage.addEventListener("click", reveal);
  stage.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); reveal(); }
  });
</script>
</body>
</html>
